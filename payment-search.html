<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Plan Search | FIBI Law</title>
<link rel="icon" href="https://fibilaw.com/wp-content/uploads/2022/10/fibi-fav-01.png">
<style>
:root{
  --dark:#012e44;--mid:#135766;--teal:#34acaa;--teal2:#25878d;
  --light:#ace4e1;--xlight:#e3f6f5;--bright:#3cbfba;--border:#c8e8e6;
  --green:#27ae60;--amber:#e8a020;--red:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Georgia','Times New Roman',serif;background:var(--xlight);color:#111;line-height:1.55;min-height:100vh;}

/* ── Header ── */
header{background:var(--dark);display:flex;align-items:center;padding:0 22px 0 0;
  box-shadow:0 2px 14px rgba(1,46,68,.45);position:sticky;top:0;z-index:100;}
.hdr-logo{height:66px;padding:10px 18px;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.12);}
.hdr-logo img{height:42px;width:auto;}
.hdr-text{padding:0 16px;}
.hdr-text h1{font-size:16px;letter-spacing:.3px;color:#fff;font-family:'Georgia',serif;}
.hdr-text p{font-size:11px;color:var(--light);margin-top:2px;font-family:Arial,sans-serif;}
.hdr-pill{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;color:var(--light);
  letter-spacing:.05em;font-family:Arial,sans-serif;}

/* ── Layout ── */
.main{max-width:1020px;margin:32px auto;padding:0 20px 60px;}
.card{background:#fff;border-radius:8px;border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(1,46,68,.07);margin-bottom:20px;overflow:hidden;}
.card-hdr{background:linear-gradient(135deg,var(--dark) 0%,var(--mid) 100%);
  padding:14px 20px;display:flex;align-items:center;gap:10px;}
.card-hdr h2{font-size:14px;color:#fff;font-weight:600;letter-spacing:.2px;}
.card-hdr p{font-size:11px;color:var(--light);margin-top:2px;font-family:Arial,sans-serif;opacity:.85;}
.card-body{padding:22px 24px;}

/* ── Search controls ── */
.search-row{display:flex;gap:10px;flex-wrap:wrap;}
.inp{flex:1;min-width:220px;padding:10px 14px;border:1.5px solid var(--border);
  border-radius:6px;font-size:14px;color:#111;background:#fafefe;
  font-family:Arial,sans-serif;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--teal);}
.sel{padding:10px 14px;border:1.5px solid var(--border);border-radius:6px;
  font-size:14px;color:#111;background:#fafefe;font-family:Arial,sans-serif;
  outline:none;cursor:pointer;}
.sel:focus{border-color:var(--teal);}
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .12s,opacity .12s;font-family:Arial,sans-serif;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal2);}
.btn-teal:disabled{opacity:.5;cursor:default;}
.hint{font-size:12px;color:#666;margin-top:10px;line-height:1.5;font-family:Arial,sans-serif;}

/* ── Spinner ── */
.spinner{display:inline-block;width:16px;height:16px;
  border:2.5px solid rgba(52,172,170,.2);border-top-color:var(--teal);
  border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty / error states ── */
.state-box{padding:40px 20px;text-align:center;color:#888;font-size:14px;font-family:Arial,sans-serif;}
.state-icon{display:block;margin:0 auto 12px;opacity:.25;color:var(--mid);}

/* ── Status badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;
  white-space:nowrap;font-family:Arial,sans-serif;}
.badge::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;}
.badge-active{background:#d5f3eb;color:#1a6e50;}.badge-active::before{background:var(--green);}
.badge-cancelled{background:#f0f0f0;color:#888;}.badge-cancelled::before{background:#bbb;}
.badge-failed{background:#fde8e8;color:#a52020;}.badge-failed::before{background:var(--red);}
.badge-paused{background:#fef3d8;color:#8a5a00;}.badge-paused::before{background:var(--amber);}

/* ── Results table ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;font-family:Arial,sans-serif;}
th{text-align:left;padding:9px 12px;background:var(--xlight);
  border-bottom:2px solid var(--border);font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:var(--mid);white-space:nowrap;}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f2fbfa;}
.cn{font-weight:700;color:var(--dark);}
.ce{font-size:11px;color:#888;margin-top:2px;}
.amt{font-weight:700;color:var(--mid);font-size:14px;}
.freq{font-size:11px;color:#888;margin-top:1px;}
.next-date{font-weight:600;color:var(--dark);}
.balance{font-weight:700;color:var(--teal2);}
.acct-lbl{font-size:12px;color:var(--mid);}

/* ── Summary bar ── */
.sum-bar{display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;margin-bottom:16px;font-family:Arial,sans-serif;}
.sum-count{font-size:13px;color:#666;}
.sum-count strong{color:var(--dark);}

@media(max-width:640px){th:nth-child(n+5),td:nth-child(n+5){display:none;}}
</style>
</head>
<body>

<header>
  <div class="hdr-logo">
    <img src="https://fibilaw.com/wp-content/uploads/2022/10/fibi-law-logo-white.png"
         onerror="this.style.display='none'" alt="FIBI Law">
  </div>
  <div class="hdr-text">
    <h1>Payment Plan Search</h1>
    <p>LawPay — Live Data</p>
  </div>
  <span class="hdr-pill">INTERNAL USE ONLY</span>
</header>

<main class="main">
  <div class="card">
    <div class="card-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="1.8">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <div>
        <h2>Search Clients</h2>
        <p>Find active payment plans by client name or email</p>
      </div>
    </div>
    <div class="card-body">
      <div class="search-row">
        <input class="inp" id="q-input" type="text"
               placeholder="Client name or email..."
               autocomplete="off"
               onkeydown="if(event.key==='Enter')doSearch()">
        <select class="sel" id="office-filter">
          <option value="">All Offices</option>
          <option value="woodlands">Woodlands</option>
          <option value="mountain">Stone Mountain</option>
          <option value="harlem">Harlem</option>
          <option value="bronx">Bronx</option>
          <option value="hutchinson">Hutchinson</option>
        </select>
        <button class="btn btn-teal" id="search-btn" onclick="doSearch()">Search</button>
      </div>
      <p class="hint">Searches LawPay in real time across all office accounts. Results match on client name and email address.</p>
    </div>
  </div>

  <div id="results-area"></div>
</main>

<script>
// ── Credentials ───────────────────────────────────────────────────────────────
const LP_SECRET = "uQ8841pkRxeLsDOZI8pSIgV4I9" + "p4bWYIVavUzCLDO04DRcc8fhzEaiNnQDM6yHx9";
const LP_AUTH   = "Basic " + btoa(LP_SECRET + ":");
const LP_BASE   = "https://api.8am.com/v1";

// ── Account ID → label + office lookup ───────────────────────────────────────
const OFFICE_ACCOUNTS = {
  woodlands: [
    {id:"b04IBak_SDKeVkcY_yK1qQ", label:"Woodlands Operating"},
    {id:"vla2DFLsT1KblwYswM6L3w", label:"Woodlands Trust"},
    {id:"3C1ft99GQ2KGod8Tg12Ezg", label:"eCheck – Woodlands OP"},
    {id:"WmHn9ANFTxOP56ciiTX09g", label:"eCheck – Woodlands TR"},
    {id:"_Jt5cZDFRjOYTHQ6f21LLQ", label:"CLC – Woodlands OP"},
    {id:"i9IGP8d1R2GEAsNRcvdCtQ", label:"CLC – Woodlands TR"},
  ],
  mountain: [
    {id:"xJhIGK-fRaCnoPA90zl_gQ", label:"Stone Mountain Operating"},
    {id:"13VEqjz-Swup9UbFB0c3GQ", label:"eCheck – Mountain OP"},
    {id:"rsALLNLbSSSfZ2KBRDSnVg", label:"CLC – Mountain OP"},
  ],
  harlem: [
    {id:"BMscCrawQ0Cvw6k4xFpQ9Q", label:"Harlem Operating"},
    {id:"3ks5_xNiQCedM7H2Cc8PHA", label:"eCheck – Harlem OP"},
    {id:"deyfYAI8SG-p0cSuPwzcjw", label:"CLC – Harlem OP"},
  ],
  bronx: [
    {id:"Nkd_qkbMTzO4cEKEpbtRMQ", label:"Bronx Operating"},
    {id:"jpyyjR3ER4qzdQhwNHsD-Q",  label:"eCheck – Bronx OP"},
    {id:"mdpQwFC5QYa34r93jibpqA",  label:"CLC – Bronx OP"},
  ],
  hutchinson: [
    {id:"ZAVORL4sToqBELweTDlPPg", label:"Hutchinson Operating"},
    {id:"MDK0oNh2SbSmHPanjPwPYA", label:"eCheck – Hutchinson OP"},
    {id:"5NGc7lI9SlyJY-YD9IRB_w", label:"CLC – Hutchinson OP"},
  ],
};

// Flat lookup maps
const ID_TO_LABEL  = {};
const ID_TO_OFFICE = {};
Object.entries(OFFICE_ACCOUNTS).forEach(([office, accts]) => {
  accts.forEach(a => {
    ID_TO_LABEL[a.id]  = a.label;
    ID_TO_OFFICE[a.id] = office;
  });
});
const OFFICE_ID_SET = {};
Object.entries(OFFICE_ACCOUNTS).forEach(([office, accts]) => {
  OFFICE_ID_SET[office] = new Set(accts.map(a => a.id));
});

// ── Fetch ALL recurring charges (single paginated call) ───────────────────────
async function fetchAllCharges() {
  const all = [];
  let page = 1;
  while(true){
    const data = await lpGet("/recurring/charges", { page, page_size: 100 });
    const items = data.results || [];
    all.push(...items);
    if(all.length >= (data.total_entries || 0) || items.length < 100) break;
    page++;
  }
  return all;
}

async function lpGet(path, params={}) {
  const url = new URL(LP_BASE + path);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v)));
  const r = await fetch(url.toString(), {
    headers:{ Authorization: LP_AUTH, Accept:"application/json" }
  });
  if(!r.ok){
    const body = await r.text().catch(()=>"");
    throw new Error("LawPay " + r.status + ": " + body.slice(0,200));
  }
  return r.json();
}

// ── Match query against all searchable fields ─────────────────────────────────
function matches(c, q) {
  if(!q) return true;
  const ql = q.toLowerCase();
  return [
    c.method?.name  || "",
    c.method?.email || "",   // ← key field: client email stored here
    c.description   || "",
    c.reference     || "",
  ].some(f => f.toLowerCase().includes(ql));
}

// ── Formatters ────────────────────────────────────────────────────────────────
const fmt$ = cents =>
  cents == null ? "—"
  : "$" + (cents/100).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

function fmtFreq(s) {
  if(!s) return "—";
  const u = (s.interval_unit||"").toLowerCase();
  const d = s.interval_delay || 1;
  const map = {month:"Month",week:"Week",day:"Day"};
  return d===1 ? "Every " + (map[u]||u) : "Every " + d + " " + (map[u]||u) + "s";
}

function fmtDate(str) {
  if(!str) return "—";
  try{
    const d = new Date(str.includes("T") ? str : str+"T00:00:00");
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  }catch(e){ return str; }
}

function badgeHtml(status) {
  const s = (status||"").toUpperCase();
  const cls = s==="ACTIVE"?"active":s==="CANCELLED"?"cancelled":s==="FAILED"?"failed":"paused";
  return `<span class="badge badge-${cls}">${s}</span>`;
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Main search ───────────────────────────────────────────────────────────────
async function doSearch() {
  const query  = document.getElementById("q-input").value.trim();
  const office = document.getElementById("office-filter").value;
  const btn    = document.getElementById("search-btn");
  const area   = document.getElementById("results-area");

  if(query.length < 2){
    area.innerHTML=`<div class="card"><div class="state-box">Enter at least 2 characters to search.</div></div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = "Searching…";
  area.innerHTML = `<div class="card"><div class="card-body"><div class="state-box"><span class="spinner"></span>Fetching payment plans from LawPay…</div></div></div>`;

  try{
    const all = await fetchAllCharges();

    // Filter by office (via account_id) then by search query
    const matched = all.filter(c => {
      if(office && !OFFICE_ID_SET[office]?.has(c.account_id)) return false;
      return matches(c, query);
    });

    renderResults(matched, query, all.length);

  }catch(e){
    const isCors = /failed to fetch|networkerror/i.test(e.message);
    area.innerHTML=`<div class="card">
      <div class="card-body">
        <div class="state-box">
          <svg class="state-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/>
          </svg>
          <strong>Search failed</strong><br><span style="font-size:12px">${esc(e.message)}</span>
        </div>
        ${isCors?`<div style="background:#fef3d8;border:1.5px solid var(--amber);border-radius:6px;padding:14px;font-size:13px;color:#6b4200;line-height:1.6;font-family:Arial,sans-serif;">
          <strong>Browser security (CORS) is blocking the LawPay API.</strong>
          A quick Cloudflare Worker proxy will fix this — let IT know.
        </div>`:""}
      </div>
    </div>`;
  }finally{
    btn.disabled = false;
    btn.textContent = "Search";
  }
}

function renderResults(results, query, totalLoaded) {
  const area = document.getElementById("results-area");

  if(!results.length){
    area.innerHTML=`<div class="card"><div class="card-body"><div class="state-box">
      <svg class="state-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      No active payment plans found for <strong>&ldquo;${esc(query)}&rdquo;</strong>
    </div></div></div>`;
    return;
  }

  // Sort active first, then by next payment date
  results.sort((a,b)=>{
    if(a.status==="ACTIVE" && b.status!=="ACTIVE") return -1;
    if(a.status!=="ACTIVE" && b.status==="ACTIVE") return  1;
    return (a.next_payment||"").localeCompare(b.next_payment||"");
  });

  const rows = results.map(c => {
    const name    = (c.method?.name || "—").trim();
    const email   = c.method?.email || "";
    const acct    = ID_TO_LABEL[c.account_id] || c.account_id || "—";
    const paid    = c.total_amount != null ? fmt$(c.total_amount) : "—";
    const balance = (c.max_amount != null && c.total_amount != null)
                    ? fmt$(c.max_amount - c.total_amount) : "—";
    const nextDt  = fmtDate(c.next_payment);

    return `<tr>
      <td>
        <div class="cn">${esc(name)}</div>
        ${email?`<div class="ce">${esc(email)}</div>`:""}
      </td>
      <td><span class="acct-lbl">${esc(acct)}</span></td>
      <td>${badgeHtml(c.status)}</td>
      <td>
        <div class="amt">${fmt$(c.amount)}</div>
        <div class="freq">${fmtFreq(c.schedule)}</div>
      </td>
      <td>${paid}</td>
      <td><span class="next-date">${nextDt}</span></td>
      <td><span class="balance">${balance}</span></td>
    </tr>`;
  }).join("");

  area.innerHTML=`<div class="card">
    <div class="card-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="1.8">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      <div>
        <h2>${results.length} Plan${results.length!==1?"s":""} Found</h2>
        <p>Matching &ldquo;${esc(query)}&rdquo; &mdash; ${totalLoaded} total plans in LawPay</p>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Account</th>
            <th>Status</th>
            <th>Plan</th>
            <th>Paid to Date</th>
            <th>Next Payment</th>
            <th>Balance Remaining</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

window.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("q-input").focus();
});
</script>
</body>
</html>

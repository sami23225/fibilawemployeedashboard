<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heartland Past Invoices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #012D44;
      --navy-deep: #011e2f;
      --navy-mid:  #013a58;
      --teal:      #3cbfba;
      --teal-light:#e6f9f8;
      --green:     #16a34a;
      --amber:     #d97706;
      --red:       #dc2626;
      --gray:      #6b7280;
      --light:     #f3f4f6;
      --border:    #e5e7eb;
      --white:     #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f7;
      color: #111827;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header img {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .brand-name { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.2; }
    .brand-sub  { font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: .08em; }
    .header-title {
      margin-left: auto;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      letter-spacing: .02em;
    }

    /* ── Search card ── */
    .search-card {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
    }
    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 1100px) { .filters { grid-template-columns: 1fr 1fr 1fr; } }
    @media (max-width: 700px)  { .filters { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 500px)  { .filters { grid-template-columns: 1fr; } }

    label {
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--gray);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: var(--white);
    }
    input:focus, select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(60,191,186,.15);
    }
    .btn-reset {
      padding: 8px 18px;
      background: var(--light);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--gray);
      font-weight: 600;
      transition: background .15s;
      white-space: nowrap;
      height: 38px;
    }
    .btn-reset:hover { background: var(--border); }

    /* ── Stats bar ── */
    .stats-bar {
      padding: 10px 32px;
      font-size: 0.83rem;
      color: var(--gray);
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .stats-bar b { color: #111; }

    /* ── Table wrapper ── */
    .table-wrap { padding: 24px 32px; overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      font-size: 0.875rem;
    }
    thead { background: var(--navy); color: var(--white); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { background: var(--navy-mid); }
    th.sorted .sort-arrow { opacity: 1 !important; }
    .sort-arrow { opacity: 0.35; margin-left: 4px; font-style: normal; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafb; }
    td { padding: 12px 16px; vertical-align: middle; }

    /* account badge */
    .acct-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .acct-hutch  { background: #dbeafe; color: #1e40af; }
    .acct-fibi   { background: #ede9fe; color: #5b21b6; }
    .acct-bronx  { background: #fce7f3; color: #9d174d; }
    .acct-other  { background: var(--light); color: var(--gray); }

    /* status badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-paid    { background: #dcfce7; color: #15803d; }
    .badge-partial { background: #fef3c7; color: var(--amber); }
    .badge-sent    { background: #dbeafe; color: #1d4ed8; }
    .badge-viewed  { background: #ede9fe; color: #6d28d9; }
    .badge-pastdue { background: #fee2e2; color: var(--red); }
    .badge-draft   { background: var(--light); color: var(--gray); }
    .badge-unknown { background: var(--light); color: var(--gray); }

    /* action buttons */
    .btn-dl, .btn-view {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity .15s, background .15s;
      cursor: pointer;
    }
    .btn-dl {
      background: var(--teal);
      color: var(--white);
      border: none;
    }
    .btn-dl:hover { opacity: .88; }

    .btn-view {
      background: var(--white);
      color: var(--navy);
      border: 1.5px solid var(--navy);
    }
    .btn-view:hover { background: var(--teal-light); border-color: var(--teal); color: var(--navy); }

    /* empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty svg { margin: 0 auto 12px; display: block; opacity: .25; }

    /* pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px 32px;
      font-size: 0.83rem;
    }
    .pagination button {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.83rem;
      transition: background .1s;
    }
    .pagination button:hover:not(:disabled) { background: var(--teal-light); border-color: var(--teal); }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination .page-info { color: var(--gray); }
  </style>
</head>
<body>

<header>
  <img src="https://framerusercontent.com/images/7MqXsKyjGWvLQn25G3nNRe5KAM.webp?width=186&height=186" alt="Fibi Law" />
  <div>
    <div class="brand-name">Fibi Law</div>
    <div class="brand-sub">For Immigrants, By Immigrants</div>
  </div>
  <div class="header-title">Heartland Past Invoices</div>
</header>

<div class="search-card">
  <div class="filters">
    <div>
      <label>Search client or invoice #</label>
      <input type="search" id="q" placeholder="e.g. Keita  or  0691" oninput="applyFilters()" />
    </div>
    <div>
      <label>Account</label>
      <select id="accountFilter" onchange="applyFilters()">
        <option value="">All accounts</option>
        <option value="FIBI Law Firm - Hutchinson">Hutchinson</option>
        <option value="FIBI LAW FIRM">FIBI LAW FIRM</option>
        <option value="FIBI Law Firm - The Bronx">The Bronx</option>
      </select>
    </div>
    <div>
      <label>Status</label>
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option>Paid</option>
        <option>Partial</option>
        <option>Sent</option>
        <option>Viewed</option>
        <option>Past Due</option>
        <option>Draft</option>
      </select>
    </div>
    <div>
      <label>From date</label>
      <input type="date" id="dateFrom" onchange="applyFilters()" />
    </div>
    <div>
      <label>To date</label>
      <input type="date" id="dateTo" onchange="applyFilters()" />
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn-reset" onclick="resetFilters()">Clear</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar">Loading invoices…</div>

<div class="table-wrap">
  <table id="invoiceTable">
    <thead>
      <tr>
        <th onclick="sortBy('invoice_number')">Invoice # <span class="sort-arrow" id="arrow-invoice_number">↕</span></th>
        <th onclick="sortBy('client_name')">Client <span class="sort-arrow" id="arrow-client_name">↕</span></th>
        <th onclick="sortBy('account')">Account <span class="sort-arrow" id="arrow-account">↕</span></th>
        <th onclick="sortBy('date')">Date <span class="sort-arrow" id="arrow-date">↕</span></th>
        <th onclick="sortBy('amount')">Amount <span class="sort-arrow" id="arrow-amount">↕</span></th>
        <th onclick="sortBy('balance')">Balance Due <span class="sort-arrow" id="arrow-balance">↕</span></th>
        <th onclick="sortBy('status')">Status <span class="sort-arrow" id="arrow-status">↕</span></th>
        <th>Invoice</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="pagination" id="paginationBar"></div>

<script>
  const PDF_DIR = 'pdfs/';
  const PAGE_SZ = 50;

  let allInvoices = [];
  let filtered    = [];
  let sortField   = 'date';
  let sortAsc     = false;
  let currentPage = 1;

  fetch('index.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('index.json not found'); return r.json(); })
    .then(data => { allInvoices = data; applyFilters(); })
    .catch(err => {
      document.getElementById('statsBar').textContent = 'Could not load invoice data: ' + err.message;
    });

  function applyFilters() {
    var q       = document.getElementById('q').value.toLowerCase().trim();
    var account = document.getElementById('accountFilter').value;
    var status  = document.getElementById('statusFilter').value;
    var from    = document.getElementById('dateFrom').value;
    var to      = document.getElementById('dateTo').value;
    filtered = allInvoices.filter(function(inv) {
      if (q && inv.invoice_number.toLowerCase().indexOf(q) === -1 &&
               inv.client_name.toLowerCase().indexOf(q) === -1) return false;
      if (account && (inv.account || '') !== account) return false;
      if (status && displayStatus(inv) !== status) return false;
      if (from   && inv.date < from) return false;
      if (to     && inv.date > to)   return false;
      return true;
    });
    doSort();
    currentPage = 1;
    render();
  }

  function sortBy(field) {
    if (sortField === field) { sortAsc = !sortAsc; }
    else { sortField = field; sortAsc = true; }
    document.querySelectorAll('th').forEach(function(th) { th.classList.remove('sorted'); });
    var arrowEl = document.getElementById('arrow-' + field);
    if (arrowEl) {
      arrowEl.parentElement.classList.add('sorted');
      arrowEl.textContent = sortAsc ? '↑' : '↓';
    }
    doSort(); render();
  }

  function doSort() {
    filtered.sort(function(a, b) {
      var va = a[sortField] != null ? a[sortField] : '';
      var vb = b[sortField] != null ? b[sortField] : '';
      if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
      va = va.toString().toLowerCase();
      vb = vb.toString().toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  function resetFilters() {
    document.getElementById('q').value             = '';
    document.getElementById('accountFilter').value = '';
    document.getElementById('statusFilter').value  = '';
    document.getElementById('dateFrom').value      = '';
    document.getElementById('dateTo').value        = '';
    applyFilters();
  }

  function usd(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function displayStatus(inv) {
    if (inv.balance > 0 && inv.status === 'Paid') return 'Partial';
    return inv.status;
  }

  function badgeClass(status) {
    var map = { Paid:'paid', Partial:'partial', Sent:'sent', Viewed:'viewed', 'Past Due':'pastdue', Draft:'draft' };
    return 'badge badge-' + (map[status] || 'unknown');
  }

  function acctBadge(account) {
    var cls = 'acct-other';
    var label = account || 'Unknown';
    if ((account || '').indexOf('Hutchinson') !== -1) { cls = 'acct-hutch'; label = 'Hutchinson'; }
    else if ((account || '').indexOf('Bronx') !== -1) { cls = 'acct-bronx'; label = 'The Bronx'; }
    else if ((account || '').indexOf('FIBI') !== -1)  { cls = 'acct-fibi';  label = 'FIBI LAW FIRM'; }
    return '<span class="acct-badge ' + cls + '">' + label + '</span>';
  }

  function fmtDate(d) {
    if (!d) return '—';
    var parts = d.split('-');
    if (parts.length < 3) return d;
    var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mo[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
  }

  function actionBtn(inv) {
    if (inv.available) {
      return '<a class="btn-dl" href="' + PDF_DIR + inv.filename + '" download>'
           + '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'
           + ' Download PDF</a>';
    }
    if (inv.view_link) {
      return '<a class="btn-view" href="' + inv.view_link + '" target="_blank" rel="noopener">'
           + '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
           + ' View Invoice</a>';
    }
    return '<span style="color:#9ca3af;font-size:.8rem">—</span>';
  }

  function render() {
    var total = filtered.length;
    var pages = Math.max(1, Math.ceil(total / PAGE_SZ));
    currentPage = Math.min(currentPage, pages);
    var start = (currentPage - 1) * PAGE_SZ;
    var page  = filtered.slice(start, start + PAGE_SZ);

    document.getElementById('statsBar').innerHTML =
      'Showing <b>' + total + '</b> of <b>' + allInvoices.length + '</b> invoices';

    if (page.length === 0) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="8"><div class="empty">'
        + '<svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5z"/></svg>'
        + '<p>No invoices match your filters.</p></div></td></tr>';
    } else {
      var rows = '';
      for (var i = 0; i < page.length; i++) {
        var inv = page[i];
        var balColor = inv.balance > 0 ? '#dc2626' : '#16a34a';
        rows += '<tr>'
          + '<td><b>' + inv.invoice_number + '</b></td>'
          + '<td>' + inv.client_name + '</td>'
          + '<td>' + acctBadge(inv.account) + '</td>'
          + '<td>' + fmtDate(inv.date) + '</td>'
          + '<td>' + usd(inv.amount) + '</td>'
          + '<td style="color:' + balColor + '">' + usd(inv.balance) + '</td>'
          + '<td><span class="' + badgeClass(displayStatus(inv)) + '">' + displayStatus(inv) + '</span></td>'
          + '<td>' + actionBtn(inv) + '</td>'
          + '</tr>';
      }
      document.getElementById('tableBody').innerHTML = rows;
    }

    if (pages <= 1) {
      document.getElementById('paginationBar').innerHTML = '';
    } else {
      document.getElementById('paginationBar').innerHTML =
        '<button onclick="goPage(1)" ' + (currentPage===1?'disabled':'') + '>«</button>'
        + '<button onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>‹</button>'
        + '<span class="page-info">Page ' + currentPage + ' of ' + pages + '</span>'
        + '<button onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===pages?'disabled':'') + '>›</button>'
        + '<button onclick="goPage(' + pages + ')" ' + (currentPage===pages?'disabled':'') + '>»</button>';
    }
  }

  function goPage(n) {
    currentPage = n;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
